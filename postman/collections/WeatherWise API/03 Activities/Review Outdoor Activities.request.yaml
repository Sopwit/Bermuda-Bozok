$kind: http-request
description: Returns quick suitability guidance for walking, cycling, and outdoor dining from the current weather.
url: "{{baseUrl}}/recommendations/activities"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "city": "{{city}}",
      "language": "en"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Activities payload is valid", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.status).to.eql("success");
          pm.expect(jsonData.activities).to.be.an("array");
          pm.expect(jsonData.activities.length).to.be.at.least(3);
      });
    language: text/javascript
order: 400
