name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.13"

jobs:
  backend:
    name: Backend (${{ matrix.os }}, py-${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify model assets load correctly
        run: python -c "
from pathlib import Path
import joblib
models = Path('models')
for name in ['model_umbrella.joblib', 'model_clothing.joblib', 'label_encoder_clothing.joblib', 'model_features.joblib']:
    obj = joblib.load(models / name)
    print(f'  ✓ {name} — {type(obj).__name__}')
print('All model assets loaded successfully.')
"

      - name: Run tests
        run: python -m pytest -v --tb=short

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
